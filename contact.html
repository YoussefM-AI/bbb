<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Contact — Pescorama</title>
  <meta name="description" content="Contact Pescorama">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <script src="https://kit.fontawesome.com/a2d9c8b3a0.js" crossorigin="anonymous"></script>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div id="site-header"></div>

  <main class="container section contact-page">
    <h1>Contact Us</h1>

    <div class="grid grid-2 contact-grid">
      <div>
        <form id="contact-form">
          <label for="name">Name</label>
          <input id="name" name="name" required>

          <label for="email">Email</label>
          <input id="email" name="email" type="email" required>

          <label for="message">Message</label>
          <textarea id="message" name="message" rows="6" required></textarea>

          <button type="submit" class="btn btn-primary">Send Message</button>
          <p id="contact-feedback" class="muted"></p>
        </form>
      </div>

      <div>
        <h2>Find Us</h2>
        <!-- OpenStreetMap embed (no API needed) -->
        <iframe width="100%" height="300" frameborder="0" scrolling="no" marginheight="0" marginwidth="0" src="https://www.openstreetmap.org/export/embed.html?bbox=-0.09%2C51.505%2C-0.07%2C51.515&amp;layer=mapnik&amp;marker=51.51%2C-0.08" style="border:1px solid #ccc"></iframe>
        <p class="muted">123 Harbor Lane, Coastal Town</p>
      </div>
    </div>
  </main>

  <div id="site-footer"></div>
  <script src="js/components.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
